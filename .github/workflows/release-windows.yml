name: Build Windows Executable

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload executable
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PackageJson = Get-Content ./package.json | ConvertFrom-Json

          $PackageName = $PackageJson.name
          $PackageVersion = $PackageJson.version

          if ([string]::IsNullOrWhiteSpace($PackageName)) {
            Write-Error "package.json name is missing."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($PackageVersion)) {
            Write-Error "package.json version is missing."
            exit 1
          }

          $AppName = ($PackageName -split "/")[-1]
          $AppName = $AppName -replace "[^a-zA-Z0-9._-]", "-"

          $ReleaseTag = "${{ github.event.release.tag_name }}"
          $CleanReleaseTag = $ReleaseTag -replace "^v", ""

          if ($CleanReleaseTag -ne $PackageVersion) {
            Write-Error "Release tag '$ReleaseTag' does not match package.json version '$PackageVersion'."
            exit 1
          }

          New-Item -ItemType Directory -Force dist | Out-Null

          $OutputFile = "./dist/$AppName.exe"

          bun build --compile --target=bun-windows-x64-baseline ./src/index.ts --outfile $OutputFile

          gh release upload $ReleaseTag $OutputFile --clobber