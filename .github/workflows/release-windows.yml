name: Build Windows Executable

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload executable
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:GH_TOKEN = "${{ github.token }}"

          bun --version

          $PackageJson = Get-Content ./package.json | ConvertFrom-Json

          $PackageName = $PackageJson.name
          $PackageVersion = $PackageJson.version

          if ([string]::IsNullOrWhiteSpace($PackageName)) {
            Write-Error "package.json name is missing."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($PackageVersion)) {
            Write-Error "package.json version is missing."
            exit 1
          }

          $AppName = ($PackageName -split "/")[-1]
          $AppName = $AppName -replace "[^a-zA-Z0-9._-]", "-"

          $EventName = "${{ github.event_name }}"

          if ($EventName -eq "release") {
            $ReleaseTag = "${{ github.event.release.tag_name }}"
          } else {
            $ReleaseTag = "v$PackageVersion"
          }

          $CleanReleaseTag = $ReleaseTag -replace "^v", ""

          if ($CleanReleaseTag -ne $PackageVersion) {
            Write-Error "Release tag '$ReleaseTag' does not match package.json version '$PackageVersion'."
            exit 1
          }

          New-Item -ItemType Directory -Force dist | Out-Null

          $OutputFile = "./dist/$AppName.exe"

          bun build --compile --target=bun-windows-x64 ./src/index.ts --outfile $OutputFile

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Bun build failed."
            exit 1
          }

          if (!(Test-Path $OutputFile)) {
            Write-Error "Expected executable was not created: $OutputFile"
            exit 1
          }

          gh release view $ReleaseTag | Out-Null
          gh release upload $ReleaseTag $OutputFile --clobber